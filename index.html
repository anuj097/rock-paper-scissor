<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="heading"> Rock, Paper, Scissor-Game</h1>
    <div class="choices">
        <div class="choice" id="rock">
            <img src="./images/rock.jpeg">
        </div>
        <div class="choice" id="paper">
            <img src="./images/paper.png">
        </div>
        <div class="choice" id="scissor">
            <img src="./images/scissor.png">
        </div>
    </div>
    <div class="selection">
        <p id="output">No Selections</p>
    </div>
    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>
    <div class="result">
        <p id="msg">Start the Game</p>
    </div>
</body>
<script src = "app.js"></script>
</html>
